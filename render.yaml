databases:
  - name: emt-b2b-db
    databaseName: emt_b2b
    user: emt_admin
    plan: free

services:
  # Backend API
  - type: web
    name: emt-b2b-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emt-b2b-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        fromService:
          name: emt-b2b-frontend
          type: web
          property: host

  # Frontend Static Site (always free on Render)
  - type: web
    name: emt-b2b-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: emt-b2b-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
