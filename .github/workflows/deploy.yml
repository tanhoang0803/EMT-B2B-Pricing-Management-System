name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & lint backend
        working-directory: backend
        run: npm install

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Deploy Backend to Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" | \
            grep -q "200\|201" && echo "Backend deploy triggered" || echo "Backend deploy hook failed"

      - name: Deploy Frontend to Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" | \
            grep -q "200\|201" && echo "Frontend deploy triggered" || echo "Frontend deploy hook failed"
